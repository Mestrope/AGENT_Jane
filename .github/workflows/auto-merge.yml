name: Auto-merge PR from WaqassKhn

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'WaqassKhn'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Merge PR from WaqassKhn
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              const pr = context.payload.pull_request;
              
              // Check if PR is open and mergeable
              if (pr.state !== 'open') {
                console.log('PR is not open, skipping merge');
                return;
              }
              
              console.log(`Merging PR #${pr.number} from ${pr.user.login}...`);
              
              // Merge the PR with squash method
              const merge = await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash',
                commit_title: pr.title,
                commit_message: `${pr.body || ''}\n\nCo-authored-by: ${pr.user.login} <${pr.user.login}@users.noreply.github.com>`
              });
              
              console.log('✅ PR merged successfully:', merge.data.message);
            } catch (error) {
              console.log('ℹ️  Merge skipped:', error.message);
            }

      - name: Log merge status
        run: echo "✅ Merge workflow completed for PR #${{ github.event.pull_request.number }} from WaqassKhn"
