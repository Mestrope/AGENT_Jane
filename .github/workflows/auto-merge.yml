name: Auto-merge PR from WaqassKhn

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'WaqassKhn'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Enable auto-merge using GraphQL
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const query = `
              mutation EnableAutoMerge($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $pullRequestId
                  mergeMethod: SQUASH
                }) {
                  pullRequest {
                    number
                    autoMergeRequest {
                      enabledAt
                    }
                  }
                }
              }
            `;
            
            const result = await github.graphql(query, {
              pullRequestId: context.payload.pull_request.node_id
            });
            
            console.log('Auto-merge enabled:', result);

      - name: Log auto-merge enabled
        run: echo "✅ PR #${{ github.event.pull_request.number }} from WaqassKhn auto-merge enabled (squash method)"
