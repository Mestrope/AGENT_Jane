name: Auto-merge PR from WaqassKhn

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'WaqassKhn'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Enable auto-merge for WaqassKhn PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.pulls.enableAutoMerge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'squash'
            });

      - name: Log auto-merge enabled
        run: echo "✅ PR #${{ github.event.pull_request.number }} from WaqassKhn auto-merge enabled (squash method)"
